spring.application.name=JwtSpringSecurity

# ============================================================
#   Application Configuration
# ============================================================

# ============================================================
#   MySQL Database Configuration
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/jwt_security_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sat123@@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
#   JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
#   JWT Configuration
# ============================================================
# Secret key - must be at least 256 bits (32+ characters) for HS256
app.jwt.secret=Y3Jvd2RhZnJhaWRndWxmZm9yd2FyZGNoYXJhY3RlcmVxdWlwbWVudGZ1ZWxzaW5jZQ==
# Token expiration: 24 hours in milliseconds (24 * 60 * 60 * 1000)
app.jwt.expiration=86400000

# ============================================================
#   Server Configuration
# ============================================================
server.port=8080

# ============================================================
#   Logging
# ============================================================
logging.level.com.security.jwt=DEBUG
logging.level.org.springframework.security=DEBUG
